<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="google-site-verification" content="rI9K2Pa-DgQO16d4sWBGmKhtm-KiO1B4_1EQXYvrctk" />
<title>YouTube Stream Viewer</title>
<link rel="icon" href="icon.ico">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <input id="yt-input" placeholder="YouTube URL or ID" />
  <button id="load-btn">Load</button>
  <button id="fs-enter" aria-label="Enter fullscreen">&#x26F6;</button>
  <button id="fs-exit" aria-label="Exit fullscreen">&#x2715;</button>
</header>
<div id="container">
  <div id="video-wrapper">
    <iframe id="video-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <iframe id="chat-frame"></iframe>
</div>
<script src="script.js"></script>
</body>
</html>
